version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: financecopilot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       financecopilot
      POSTGRES_USER:     dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d financecopilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financecopilot_api
    restart: unless-stopped
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL:                   postgresql+asyncpg://dev:dev@db:5432/financecopilot
      SECRET_KEY:                     dev-secret-key-change-in-production-32bytes
      ALGORITHM:                      HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:    15
      REFRESH_TOKEN_EXPIRE_DAYS:      7
      ALLOWED_ORIGINS:                http://localhost:5173,http://localhost:3000
      DEBUG:                          "true"
      APP_ENV:                        development
      GEMINI_API_KEY:                 ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app    # Hot reload in dev

volumes:
  pgdata:
    driver: local
